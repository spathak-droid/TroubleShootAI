# =============================================================================
# BROKEN WORKLOADS FOR LIVE TESTING
# Deploy these to a Kind cluster to generate realistic failure scenarios.
# Each workload has a specific failure mode for the analyzer to detect.
# =============================================================================

---
# ── Scenario 1: CrashLoopBackOff ─────────────────────────────────────────────
# App exits immediately because it can't connect to a database that doesn't exist.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-crashloop
  namespace: default
  labels:
    app: api-crashloop
    scenario: crashloop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-crashloop
  template:
    metadata:
      labels:
        app: api-crashloop
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Starting api-server v2.1.0..."
              echo "Connecting to database postgres.db.svc.cluster.local:5432..."
              sleep 1
              echo "ERROR: Failed to connect to database: connection refused"
              echo "ERROR: dial tcp 10.96.42.17:5432: connect: connection refused"
              echo "FATAL: Cannot start without database connection, exiting"
              exit 1
          env:
            - name: DB_HOST
              value: "postgres.db.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_PASSWORD
              value: "super-secret-password-123!"
            - name: API_KEY
              value: "sk-proj-abc123def456ghi789"
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"

---
# ── Scenario 2: OOMKilled ────────────────────────────────────────────────────
# Container allocates more memory than its limit allows → killed with exit 137.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-oom
  namespace: default
  labels:
    app: worker-oom
    scenario: oom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-oom
  template:
    metadata:
      labels:
        app: worker-oom
    spec:
      containers:
        - name: worker
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Starting batch worker with -Xmx512m..."
              echo "Allocating memory for data processing..."
              # Allocate ~100MB which exceeds the 32Mi limit
              dd if=/dev/zero bs=1M count=100 of=/dev/null 2>&1 || true
              # Actually eat memory until OOM
              tail /dev/zero
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"

---
# ── Scenario 3: ImagePullBackOff ─────────────────────────────────────────────
# References a non-existent image tag.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-badimage
  namespace: default
  labels:
    app: frontend-badimage
    scenario: imagepull
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-badimage
  template:
    metadata:
      labels:
        app: frontend-badimage
    spec:
      containers:
        - name: nginx
          image: nginx:v99.99.99-does-not-exist
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"

---
# ── Scenario 4: Pending (Insufficient Resources) ────────────────────────────
# Requests way more CPU than the cluster has.
apiVersion: v1
kind: Pod
metadata:
  name: ml-training-huge
  namespace: default
  labels:
    app: ml-training
    scenario: pending
spec:
  containers:
    - name: trainer
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          memory: "64Mi"
          cpu: "32"    # 32 cores — no node has this
        limits:
          memory: "128Mi"
          cpu: "32"

---
# ── Scenario 5: CreateContainerConfigError (Missing ConfigMap) ───────────────
# References a ConfigMap that doesn't exist.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-app-broken
  namespace: default
  labels:
    app: config-app
    scenario: missing-config
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-app
  template:
    metadata:
      labels:
        app: config-app
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sleep", "3600"]
          env:
            - name: APP_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: app-settings-does-not-exist
                  key: config.yaml
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"

---
# ── Scenario 6: NetworkPolicy deny-all (blocks all traffic) ──────────────────
# App runs but can't talk to anything — connection timeouts in logs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-isolated
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: isolated-app
  policyTypes:
    - Ingress
    - Egress
  # No ingress/egress rules = deny everything

---
apiVersion: v1
kind: Pod
metadata:
  name: isolated-app
  namespace: default
  labels:
    app: isolated-app
    scenario: network-deny
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Starting isolated-app..."
          echo "Trying to reach kubernetes API..."
          wget -T 5 -q https://kubernetes.default.svc/api -O /dev/null 2>&1 || echo "ERROR: Connection to kubernetes API timed out"
          echo "Trying DNS resolution..."
          nslookup kubernetes.default.svc 2>&1 || echo "ERROR: DNS resolution failed"
          echo "Trying to reach external service..."
          wget -T 5 -q http://httpbin.org/get -O /dev/null 2>&1 || echo "ERROR: Connection to external service timed out"
          echo "All network connections failed — pod is network-isolated"
          sleep 3600
      resources:
        requests:
          memory: "16Mi"
          cpu: "10m"
        limits:
          memory: "32Mi"
          cpu: "50m"

---
# ── Scenario 7: Service with wrong selector (no endpoints) ──────────────────
# Service exists but matches no pods → connection refused when accessed.
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: default
  labels:
    scenario: no-endpoints
spec:
  selector:
    app: backend-that-doesnt-exist   # no pod has this label
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP

---
# App tries to call the broken service → connection refused
apiVersion: v1
kind: Pod
metadata:
  name: client-app
  namespace: default
  labels:
    app: client-app
    scenario: service-down
spec:
  containers:
    - name: client
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Starting client-app..."
          echo "Connecting to backend-api service..."
          i=0
          while [ $i -lt 5 ]; do
            wget -T 3 -q http://backend-api.default.svc:8080/health -O /dev/null 2>&1 || echo "ERROR: Connection to backend-api:8080 refused — no endpoints available"
            sleep 2
            i=$((i+1))
          done
          echo "FATAL: Backend service unreachable after 5 attempts"
          sleep 3600
      resources:
        requests:
          memory: "16Mi"
          cpu: "10m"
        limits:
          memory: "32Mi"
          cpu: "50m"

---
# ── Scenario 8: DNS failure (wrong service name) ────────────────────────────
# App tries to resolve a service that doesn't exist → DNS NXDOMAIN.
apiVersion: v1
kind: Pod
metadata:
  name: dns-fail-app
  namespace: default
  labels:
    app: dns-fail-app
    scenario: dns-failure
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Starting dns-fail-app..."
          echo "Resolving database service..."
          nslookup postgres-primary.database.svc.cluster.local 2>&1 || echo "ERROR: DNS lookup failed for postgres-primary.database.svc.cluster.local: NXDOMAIN"
          echo "Resolving cache service..."
          nslookup redis-master.cache.svc.cluster.local 2>&1 || echo "ERROR: DNS lookup failed for redis-master.cache.svc.cluster.local: NXDOMAIN"
          echo "FATAL: Required services not resolvable, cannot start"
          exit 1
      resources:
        requests:
          memory: "16Mi"
          cpu: "10m"
        limits:
          memory: "32Mi"
          cpu: "50m"

---
# ── Healthy control pod ──────────────────────────────────────────────────────
# This should NOT be flagged by the analyzer.
apiVersion: v1
kind: Pod
metadata:
  name: healthy-control
  namespace: default
  labels:
    app: healthy-control
    scenario: healthy
spec:
  containers:
    - name: web
      image: busybox:1.36
      command: ["sh", "-c", "echo 'Healthy pod running' && sleep 3600"]
      resources:
        requests:
          memory: "16Mi"
          cpu: "10m"
        limits:
          memory: "32Mi"
          cpu: "50m"
