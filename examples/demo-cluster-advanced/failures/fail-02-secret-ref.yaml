---
# FAILURE: Pod references a Secret that doesn't exist
# Symptom: Pod stuck in CreateContainerConfigError
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
  namespace: production
  labels:
    app: payment-processor
    tier: backend
    purpose: demo-failure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-processor
  template:
    metadata:
      labels:
        app: payment-processor
        tier: backend
    spec:
      containers:
        - name: processor
          image: busybox:1.36
          command: ["sh", "-c", "while true; do echo processing payments; sleep 10; done"]
          env:
            - name: STRIPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: payment-credentials
                  key: stripe-key
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-credentials
                  key: db-password
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
