---
# FAILURE: PVC bound to non-existent StorageClass
# Symptom: PVC stays Pending, pod stuck in Pending waiting for volume.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: search-index-data
  namespace: production
  labels:
    purpose: demo-failure
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd    # This StorageClass doesn't exist
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-indexer
  namespace: production
  labels:
    app: search-indexer
    tier: backend
    purpose: demo-failure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-indexer
  template:
    metadata:
      labels:
        app: search-indexer
        tier: backend
    spec:
      containers:
        - name: indexer
          image: busybox:1.36
          command: ["sh", "-c", "while true; do echo indexing; sleep 10; done"]
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: search-index-data
